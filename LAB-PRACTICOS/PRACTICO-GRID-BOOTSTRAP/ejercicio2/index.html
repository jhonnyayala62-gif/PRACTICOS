<!DOCTYPE html>
<html lang="es">

<head>

                <!-- NARANJAS -->

                    <div class="col">

                    </div>

                    <div class="col">
                        <div class="azul"></div>
                    </div>

                    <div class="col">
                        <div class="azul"></div>
                    </div>

                </div>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="row mt-2">
            <div class="col-12">
                <div class="footer"></div>
            </div>
        </div>

    </div>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 1: Botones Interactivos con CSS</title>
    <link rel="stylesheet" href="boton.css">
</head>
<body>
    <!-- 
    PRÁCTICA 1: Botones Interactivos con CSS
    Objetivos:
    - Implementar 3 botones semánticos con diferentes estados
    - Aplicar colores, bordes y efectos hover
    - Utilizar selectores de clase y pseudo-clases
    - Implementar diseño responsive
-->
    <main class="botones-container">
        <button class="btn btn-primary" aria-label="Guardar formulario">Guardar</button>
        <button class="btn btn-success" aria-label="Confirmar acción">Aceptar</button>
        <button class="btn btn-danger" aria-label="Eliminar elemento">Eliminar</button>
    </main>
</body>
</html>
